services:
  postgres:
    image: postgres:15-alpine
    container_name: medical-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: medical_ai_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d medical_ai_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: medical-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  medical-ai-backend:
    build: .
    container_name: medical-ai-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:secretpassword@postgres:5432/medical_ai_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=09d25e094faa6ca2556c818166b7a9563b93f7099f6f0f4caa6cf63b88e8d3e7
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_MINUTES=20160
      - ADMIN_BOOTSTRAP_EMAIL=admin@example.com
      - ADMIN_BOOTSTRAP_PASSWORD=ChangeMe123!
      - ADMIN_BOOTSTRAP_TENANT=Northern Shield
      - DEBUG_TOKEN_PREVIEWS=true
      - PORT=8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  medical-ai-frontend:
    build:
      context: ./Frontend-Capstone
    container_name: medical-ai-frontend
    environment:
      - API_BASE_URL=http://medical-ai-backend:8000/api/v1
      - PORT=3000
    depends_on:
      medical-ai-backend:
        condition: service_started
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
